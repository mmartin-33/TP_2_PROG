<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="estilo.css">

</head>
<body>

<nav>
    <a href="index.html">Inicio</a>
    <a href="destacados.html">Destacados</a>
    <a href="listado.html">Listado</a>
</nav>


<h1>Productos Destacados</h1>

<div class="contenedor">
    <div class="tarjeta">Toyota Corolla</div>
    <div class="tarjeta">Honda Civic</div>
    <div class="tarjeta">Ford Ranger</div>
    <div class="tarjeta">Volkswagen Taos</div>
</div>

<h3>Seleccionados: <span id="contador">0</span></h3>


<script>
const tarjetas = document.querySelectorAll(".tarjeta");
const contador = document.getElementById("contador");

function actualizarContador() {
    const seleccionadas =
        document.querySelectorAll(".seleccionada").length;

    contador.textContent = seleccionadas;
}

tarjetas.forEach(tarjeta => {
    tarjeta.addEventListener("click", () => {
        tarjeta.classList.toggle("seleccionada");
        actualizarContador();
    });
});
</script>
    
</body>
</html>
